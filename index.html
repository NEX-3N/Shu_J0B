<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI Productivity Planner & Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-layer: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --panel-opacity: 0.85;
            --panel-bg: rgba(255, 255, 255, var(--panel-opacity));
            --primary-color: #7c3aed;
            --text-color: #1f2937;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-layer) no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color);
            transition: all 0.5s ease;
        }

        .glass-panel {
            background-color: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        .task-item { cursor: grab; transition: all 0.2s; border-left: 5px solid var(--primary-color); }
        .task-item:active { cursor: grabbing; transform: scale(0.96); }
        .task-done { opacity: 0.6; text-decoration: line-through; }
        
        .drop-zone { min-height: 50px; transition: all 0.2s; }
        .drop-zone.drag-over { background-color: rgba(255, 255, 255, 0.5); border: 2px dashed var(--primary-color); }

        .ad-space { background: rgba(0,0,0,0.05); border: 1px dashed #aaa; color: #666; font-size: 12px; display: flex; align-items: center; justify-content: center; }

        /* Dark Mode Class */
        body.dark-mode { --panel-bg: rgba(30, 30, 30, 0.85); --text-color: #f3f4f6; }
        body.dark-mode .glass-panel { border-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-3 md:p-6 min-h-screen pb-20">

    <div id="main-content" class="max-w-7xl mx-auto space-y-6">
        
        <div class="ad-space w-full h-20 rounded-xl glass-panel">ใส่โฆษณา Banner 728x90 ที่นี่ (Passive Income Spot)</div>

        <div class="glass-panel p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tight" style="color: var(--primary-color);">🦄 AI PLANNER ULTIMATE</h1>
                <p class="text-xs opacity-70 uppercase tracking-widest font-bold">Smart Productivity Suite</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="smartAI()" class="bg-violet-600 hover:bg-violet-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg transition-transform hover:scale-105">🧠 Smart AI Schedule</button>
                <button onclick="toggleDarkMode()" class="bg-gray-800 text-white p-2 rounded-lg">🌙</button>
                <button onclick="toggleThemeSettings()" class="bg-white/50 px-4 py-2 rounded-lg text-sm border border-gray-200">🎨 Theme</button>
            </div>
        </div>

        <div id="themeSettingsPanel" class="glass-panel p-5 rounded-xl hidden animate-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div><label class="text-xs font-bold">Theme Color</label><input type="color" id="primaryColorInput" class="w-full h-8 cursor-pointer rounded mt-1"></div>
                <div><label class="text-xs font-bold">Panel Opacity</label><input type="range" id="opacityInput" min="0.1" max="1" step="0.05" class="w-full mt-1"></div>
                <div><label class="text-xs font-bold">Custom BG URL</label><input type="text" id="bgInput" placeholder="https://..." class="w-full text-xs p-2 rounded border mt-1"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-3 space-y-6">
                <div class="glass-panel p-5 rounded-2xl">
                    <h3 class="font-bold mb-4 flex items-center gap-2">📥 เพิ่มงานใหม่</h3>
                    <div class="space-y-3">
                        <input type="text" id="taskInput" placeholder="ชื่องาน (เช่น อ่านหนังสือ 2h)" class="w-full p-2.5 rounded-lg border text-sm focus:ring-2 ring-violet-400 outline-none">
                        <select id="priorityInput" class="w-full p-2.5 rounded-lg border text-sm outline-none">
                            <option value="1">🔥 High Priority</option>
                            <option value="2">⚡ Medium Priority</option>
                            <option value="3">🟢 Low Priority</option>
                        </select>
                        <button onclick="addTask()" class="w-full py-2.5 rounded-lg bg-gray-900 text-white font-bold text-sm hover:bg-black">Add Task</button>
                    </div>
                </div>

                <div class="glass-panel p-5 rounded-2xl bg-gradient-to-br from-white/40 to-white/10">
                    <h3 class="font-bold mb-3 text-sm uppercase opacity-70">Analytics</h3>
                    <div id="analyticsContent" class="space-y-2 font-mono text-sm">
                        </div>
                </div>

                <div class="ad-space h-64 rounded-2xl glass-panel">Vertical Ad Space (300x600)</div>
            </div>

            <div class="lg:col-span-6 glass-panel p-5 rounded-2xl overflow-hidden">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <h2 class="font-black">🕒 DAILY SCHEDULE</h2>
                    <div class="flex gap-1">
                        <button onclick="exportData('image')" class="p-1.5 bg-gray-100 rounded text-[10px] font-bold">IMG</button>
                        <button onclick="exportData('pdf')" class="p-1.5 bg-gray-100 rounded text-[10px] font-bold">PDF</button>
                        <button onclick="resetAll()" class="p-1.5 bg-red-100 text-red-600 rounded text-[10px] font-bold">RESET</button>
                    </div>
                </div>
                <div id="timetableContainer" class="max-h-[700px] overflow-y-auto pr-2">
                    </div>
            </div>

            <div class="lg:col-span-3">
                <div class="glass-panel p-5 rounded-2xl h-full flex flex-col">
                    <h3 class="font-bold mb-4 opacity-70">📦 TASK POOL</h3>
                    <div id="taskPool" class="drop-zone flex-1 space-y-2" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                        </div>
                </div>
            </div>

        </div>

        <div class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[90%] max-w-4xl h-16 glass-panel rounded-full ad-space shadow-2xl z-50">
            Sticky Footer Ad Space (728x90) - <span class="ml-2 text-violet-600 font-bold">Passive Income Goal</span>
        </div>
    </div>

    <script>
        // --- 1. State & Logic ---
        let state = {
            tasks: [],
            slots: {}, // { "08:00": [taskId] }
            config: { start: 8, end: 20 }
        };

        // --- 2. Local Storage ---
        function save() { localStorage.setItem('planner_v2', JSON.stringify(state)); render(); }
        function load() {
            const data = localStorage.getItem('planner_v2');
            if (data) state = JSON.parse(data);
        }

        // --- 3. Core Functions ---
        function addTask() {
            const input = document.getElementById('taskInput');
            const prio = document.getElementById('priorityInput').value;
            if (!input.value.trim()) return;

            // Simple time parser (e.g. "Work 2h")
            const timeMatch = input.value.match(/(\d+)h/);
            const duration = timeMatch ? parseInt(timeMatch[1]) : 1;

            state.tasks.push({
                id: 't-' + Date.now(),
                text: input.value,
                priority: parseInt(prio),
                duration: duration,
                done: false
            });
            input.value = '';
            save();
        }

        function smartAI() {
            // Sort: Priority 1 first, then duration
            let sortedTasks = [...state.tasks].sort((a,b) => a.priority - b.priority);
            state.slots = {};
            let currentHour = state.config.start;

            sortedTasks.forEach(task => {
                for(let i=0; i<task.duration; i++) {
                    if (currentHour > state.config.end) break;
                    const timeKey = currentHour.toString().padStart(2, '0') + ':00';
                    state.slots[timeKey] = state.slots[timeKey] || [];
                    state.slots[timeKey].push(task.id);

                    // Break logic: every 3 hours add 1 hour break
                    if ((currentHour + 1) % 4 === 0) currentHour++; 
                    currentHour++;
                }
            });
            save();
        }

        // --- 4. Rendering ---
        function render() {
            renderPool();
            renderTimetable();
            renderAnalytics();
        }

        function renderPool() {
            const pool = document.getElementById('taskPool');
            pool.innerHTML = '';
            // Only show tasks NOT in slots
            const tasksInSlots = Object.values(state.slots).flat();
            
            state.tasks.filter(t => !tasksInSlots.includes(t.id)).forEach(t => {
                const el = createTaskEl(t);
                pool.appendChild(el);
            });
        }

        function createTaskEl(t) {
            const div = document.createElement('div');
            div.id = t.id;
            div.className = `task-item glass-panel p-3 rounded-xl flex justify-between items-center text-sm ${t.done ? 'task-done' : ''}`;
            div.draggable = true;
            div.ondragstart = (e) => e.dataTransfer.setData("text", t.id);
            
            const prioColor = t.priority == 1 ? 'text-red-500' : (t.priority == 2 ? 'text-yellow-600' : 'text-green-500');
            
            div.innerHTML = `
                <div class="flex flex-col">
                    <span class="font-bold">${t.text}</span>
                    <span class="text-[10px] ${prioColor}">Priority ${t.priority}</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleDone('${t.id}')" class="hover:scale-125 transition-transform">✅</button>
                    <button onclick="deleteTask('${t.id}')" class="hover:scale-125 transition-transform opacity-30 hover:opacity-100">❌</button>
                </div>
            `;
            return div;
        }

        function renderTimetable() {
            const container = document.getElementById('timetableContainer');
            let html = `<table class="w-full border-separate border-spacing-y-2">`;
            
            for(let i=state.config.start; i<=state.config.end; i++) {
                const timeKey = i.toString().padStart(2, '0') + ':00';
                const tasksAtTime = state.slots[timeKey] || [];
                
                html += `
                    <tr>
                        <td class="w-16 text-xs font-black opacity-50 align-top pt-4">${timeKey}</td>
                        <td class="drop-zone glass-panel rounded-xl p-2 min-h-[60px]" data-time="${timeKey}" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                            <div class="flex flex-wrap gap-2">
                                ${tasksAtTime.map(tid => {
                                    const t = state.tasks.find(x => x.id === tid);
                                    return t ? `<div class="bg-violet-500 text-white text-[10px] px-2 py-1 rounded-full shadow-sm">${t.text} <span onclick="removeFromSlot('${timeKey}','${tid}')" class="ml-1 cursor-pointer">×</span></div>` : '';
                                }).join('')}
                            </div>
                        </td>
                    </tr>
                `;
            }
            html += `</table>`;
            container.innerHTML = html;
        }

        function renderAnalytics() {
            const total = state.tasks.length;
            const done = state.tasks.filter(t => t.done).length;
            const efficiency = total ? Math.round((done/total)*100) : 0;
            
            document.getElementById('analyticsContent').innerHTML = `
                <div class="flex justify-between"><span>Tasks:</span> <span>${total}</span></div>
                <div class="flex justify-between text-green-500"><span>Done:</span> <span>${done}</span></div>
                <div class="mt-2 h-2 w-full bg-gray-200 rounded-full overflow-hidden">
                    <div class="h-full bg-violet-600 transition-all duration-1000" style="width: ${efficiency}%"></div>
                </div>
                <div class="text-right text-[10px] mt-1 font-bold">${efficiency}% Efficiency</div>
            `;
        }

        // --- 5. Actions ---
        function toggleDone(id) {
            const t = state.tasks.find(x => x.id === id);
            if(t) t.done = !t.done;
            save();
        }

        function deleteTask(id) {
            state.tasks = state.tasks.filter(x => x.id !== id);
            Object.keys(state.slots).forEach(k => {
                state.slots[k] = state.slots[k].filter(tid => tid !== id);
            });
            save();
        }

        function removeFromSlot(time, id) {
            state.slots[time] = state.slots[time].filter(tid => tid !== id);
            save();
        }

        function resetAll() {
            if(confirm('ล้างข้อมูลทั้งหมด?')) {
                state = { tasks: [], slots: {}, config: { start: 8, end: 20 } };
                save();
            }
        }

        // --- 6. Drag & Drop ---
        function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function drop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const id = e.dataTransfer.getData("text");
            const timeKey = e.currentTarget.getAttribute('data-time');

            if(timeKey) { // Drop into schedule
                state.slots[timeKey] = state.slots[timeKey] || [];
                if(!state.slots[timeKey].includes(id)) state.slots[timeKey].push(id);
            } else { // Drop back to pool
                Object.keys(state.slots).forEach(k => {
                    state.slots[k] = state.slots[k].filter(tid => tid !== id);
                });
            }
            save();
        }

        // --- 7. UI Controls ---
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
        function toggleThemeSettings() { document.getElementById('themeSettingsPanel').classList.toggle('hidden'); }

        // Theme Inputs
        document.getElementById('primaryColorInput').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--primary-color', e.target.value);
        });
        document.getElementById('opacityInput').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--panel-opacity', e.target.value);
        });
        document.getElementById('bgInput').addEventListener('change', (e) => {
            let val = e.target.value;
            if(val.startsWith('http')) val = `url('${val}')`;
            document.documentElement.style.setProperty('--bg-layer', val);
        });

        // --- Export ---
        async function exportData(type) {
            const el = document.getElementById('main-content');
            if(type === 'image') {
                const canvas = await html2canvas(el);
                const link = document.createElement('a');
                link.download = 'planner.png';
                link.href = canvas.toDataURL();
                link.click();
            } else if(type === 'pdf') {
                const { jsPDF } = window.jspdf;
                const canvas = await html2canvas(el);
                const pdf = new jsPDF('l', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 297, 210);
                pdf.save('planner.pdf');
            }
        }

        // Start
        load(); render();
    </script>
</body>
</html>
