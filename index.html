<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Manager & Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* กำหนดตัวแปร CSS (CSS Variables) สำหรับจัดการ Theme */
        :root {
            --bg-layer: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --panel-opacity: 0.85;
            --panel-bg: rgba(255, 255, 255, var(--panel-opacity));
            --primary-color: #3b82f6;
            --text-color: #1f2937;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-layer) no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color);
            transition: background 0.5s ease;
        }

        /* Glassmorphism Effect สำหรับกล่องต่างๆ */
        .glass-panel {
            background-color: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .task-item { cursor: grab; transition: transform 0.1s; border-left: 4px solid var(--primary-color); }
        .task-item:active { cursor: grabbing; transform: scale(0.98); }
        
        .drop-zone { min-height: 60px; transition: all 0.2s; background-color: rgba(255, 255, 255, 0.3); }
        .drop-zone.drag-over { background-color: rgba(255, 255, 255, 0.8); border: 2px dashed var(--primary-color); }
        
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { filter: brightness(0.9); }

        .exporting .delete-btn { display: none !important; }
        
        /* ซ่อนเมนูตั้งค่าเริ่มต้น */
        #themeSettingsPanel { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header & Theme Toggle -->
        <div class="glass-panel p-6 rounded-xl flex flex-col md:flex-row justify-between items-center gap-4 relative">
            <div>
                <h1 class="text-3xl font-bold" style="color: var(--primary-color);">📋 ระบบจัดตารางงานประจำวัน</h1>
                <p class="text-sm mt-1 opacity-80">ลากและวางงานลงในช่วงเวลาที่ต้องการ</p>
            </div>
            
            <div class="flex gap-3">
                <button onclick="toggleThemeSettings()" class="bg-white/50 hover:bg-white/80 text-gray-700 px-4 py-2 rounded-lg text-sm transition-all border border-gray-200 backdrop-blur-sm shadow-sm">
                    🎨 ปรับแต่งธีม
                </button>
            </div>
        </div>

        <!-- Theme Settings Panel (ซ่อนอยู่) -->
        <div id="themeSettingsPanel" class="glass-panel p-5 rounded-xl border border-gray-200 animate-fade-in">
            <h3 class="font-bold mb-4 border-b pb-2">⚙️ ตั้งค่าความสวยงาม</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- เปลี่ยนสีหลัก -->
                <div>
                    <label class="block text-sm mb-1 font-medium">สีหลัก (Primary Color)</label>
                    <input type="color" id="primaryColorInput" value="#3b82f6" class="w-full h-10 cursor-pointer rounded border border-gray-300">
                </div>
                <!-- ความทึบแสง -->
                <div>
                    <label class="block text-sm mb-1 font-medium">ความทึบแสงของกล่อง (Opacity)</label>
                    <input type="range" id="opacityInput" min="0.2" max="1" step="0.05" value="0.85" class="w-full h-10 cursor-pointer">
                </div>
                <!-- พื้นหลัง -->
                <div>
                    <label class="block text-sm mb-1 font-medium">ภาพพื้นหลัง (Image URL หรือ สี)</label>
                    <input type="text" id="bgInput" placeholder="เช่น https://... หรือ #f3f4f6" class="w-full border rounded px-3 py-2 text-sm outline-none focus:ring-2" style="--tw-ring-color: var(--primary-color);">
                    <div class="flex gap-2 mt-2">
                        <button onclick="setPresetBg('linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)')" class="w-6 h-6 rounded-full bg-gradient-to-br from-purple-200 to-blue-300 border border-white shadow"></button>
                        <button onclick="setPresetBg('linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%)')" class="w-6 h-6 rounded-full bg-gradient-to-br from-gray-100 to-gray-200 border border-gray-300 shadow"></button>
                        <button onclick="setPresetBg('url(https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2000&auto=format&fit=crop)')" class="w-6 h-6 rounded-full bg-blue-500 border border-white shadow text-white text-[10px] flex items-center justify-center">Img</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Left Panel: Task Pool -->
            <div class="md:col-span-1 glass-panel p-5 rounded-xl">
                <h2 class="font-bold mb-4 border-b pb-2 opacity-90">📦 กล่องพักงาน</h2>
                
                <div class="flex gap-2 mb-4">
                    <input type="text" id="taskInput" placeholder="พิมชื่องานที่นี่..." class="w-full border rounded px-3 py-2 text-sm outline-none bg-white/70 focus:bg-white transition-colors" onkeypress="handleKeyPress(event)">
                    <button onclick="addTask()" class="btn-primary px-4 py-2 rounded text-sm transition-colors shadow-sm">+</button>
                </div>

                <div id="taskPool" class="drop-zone flex flex-col gap-2 min-h-[300px] p-2 rounded border border-gray-300/50" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <!-- งานใหม่ -->
                </div>
            </div>

            <!-- Right Panel: Timetable -->
            <div class="md:col-span-3 glass-panel p-5 rounded-xl">
                <div class="flex flex-col md:flex-row justify-between items-center mb-4 border-b pb-3 gap-3">
                    <div class="flex items-center gap-3">
                        <h2 class="font-bold opacity-90">🕒 ตารางงาน</h2>
                        <div class="flex items-center gap-2 bg-white/40 px-3 py-1.5 rounded-lg border border-white/50 text-sm">
                            <select id="startTime" class="bg-transparent outline-none cursor-pointer"><option value="6">06:00</option><option value="7">07:00</option><option value="8" selected>08:00</option><option value="9">09:00</option></select>
                            <span>-</span>
                            <select id="endTime" class="bg-transparent outline-none cursor-pointer"><option value="15">15:00</option><option value="16">16:00</option><option value="17" selected>17:00</option><option value="18">18:00</option><option value="19">19:00</option><option value="20">20:00</option></select>
                            <button onclick="generateTimetable()" class="text-blue-600 hover:text-blue-800 font-medium ml-2">↻ อัปเดต</button>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportData('image')" class="bg-gray-800/90 hover:bg-gray-900 text-white px-3 py-1.5 rounded text-xs shadow-sm">📸 Image</button>
                        <button onclick="exportData('pdf')" class="bg-red-500/90 hover:bg-red-600 text-white px-3 py-1.5 rounded text-xs shadow-sm">📄 PDF</button>
                        <button onclick="exportData('excel')" class="bg-green-500/90 hover:bg-green-600 text-white px-3 py-1.5 rounded text-xs shadow-sm">📊 Excel</button>
                    </div>
                </div>

                <div id="timetableContainer" class="bg-white/50 p-2 rounded-lg">
                    <!-- ตารางเวลา -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ส่วนที่ 1: ระบบจัดการ Theme (เพิ่มเข้ามาใหม่)
        // ==========================================
        
        // ฟังก์ชันเปิด/ปิดแผงตั้งค่า
        function toggleThemeSettings() {
            const panel = document.getElementById('themeSettingsPanel');
            panel.style.display = panel.style.display === 'none' || panel.style.display === '' ? 'block' : 'none';
        }

        // จับ Event เมื่อมีการเปลี่ยนสี
        document.getElementById('primaryColorInput').addEventListener('input', function(e) {
            // ใช้ const รับค่า e.target.value เพราะค่านี้ในรอบการทำงานนี้จะไม่เปลี่ยนแล้ว
            const newColor = e.target.value;
            document.documentElement.style.setProperty('--primary-color', newColor);
        });

        // จับ Event เมื่อมีการเลื่อนแถบความทึบแสง (Opacity)
        document.getElementById('opacityInput').addEventListener('input', function(e) {
            const newOpacity = e.target.value;
            document.documentElement.style.setProperty('--panel-opacity', newOpacity);
        });

        // จับ Event เมื่อใส่ URL หรือโค้ดสีพื้นหลัง
        document.getElementById('bgInput').addEventListener('change', function(e) {
            let bgValue = e.target.value.trim();
            // เช็คว่าถ้าเป็น URL รูปภาพ ให้ใส่คำสั่ง url() ครอบให้
            if(bgValue.startsWith('http')) {
                bgValue = `url('${bgValue}')`;
            }
            document.documentElement.style.setProperty('--bg-layer', bgValue);
        });

        // ฟังก์ชันสำหรับปุ่ม Preset พื้นหลัง
        function setPresetBg(bgStyle) {
            document.documentElement.style.setProperty('--bg-layer', bgStyle);
            document.getElementById('bgInput').value = ''; // เคลียร์ช่องพิมพ์
        }


        // ==========================================
        // ส่วนที่ 2: ระบบจัดการงานเดิม (Logic ไม่เปลี่ยน)
        // ==========================================
        let taskIdCounter = 0;

        function generateTimetable() {
            const start = parseInt(document.getElementById('startTime').value);
            const end = parseInt(document.getElementById('endTime').value);
            const container = document.getElementById('timetableContainer');
            
            let htmlContent = `<div class="border border-white/40 rounded-lg overflow-hidden backdrop-blur-md bg-white/40"><table class="w-full text-left border-collapse" id="scheduleTable">
                <thead class="bg-black/5">
                    <tr><th class="w-24 p-3 border-b border-r border-white/40 text-center font-semibold">เวลา</th><th class="p-3 border-b border-white/40 font-semibold">รายการงานที่ต้องทำ</th></tr>
                </thead><tbody>`;

            for (let i = start; i <= end; i++) {
                const timeStr = `${i.toString().padStart(2, '0')}:00 - ${(i+1).toString().padStart(2, '0')}:00`;
                htmlContent += `
                    <tr>
                        <td class="p-3 border-b border-r border-white/40 text-center font-medium bg-black/5 align-top">${timeStr}</td>
                        <td class="p-2 border-b border-white/40 align-top">
                            <div class="drop-zone h-full w-full rounded p-1 flex flex-wrap gap-2" data-time="${timeStr}" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
                        </td>
                    </tr>`;
            }
            htmlContent += `</tbody></table></div>`;
            container.innerHTML = htmlContent;
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;

            taskIdCounter++;
            const taskId = `task-${taskIdCounter}`;
            
            const taskEl = document.createElement('div');
            taskEl.id = taskId;
            taskEl.className = 'task-item bg-white/90 shadow-sm rounded p-2 text-sm flex justify-between items-center w-full md:w-auto break-all backdrop-blur-sm';
            taskEl.draggable = true;
            taskEl.ondragstart = drag;
            
            taskEl.innerHTML = `
                <span class="mr-3 text-gray-800 font-medium">${text}</span>
                <span class="delete-btn text-gray-400 hover:text-red-500 cursor-pointer text-lg font-bold px-1" onclick="this.parentElement.remove()">×</span>
            `;

            document.getElementById('taskPool').appendChild(taskEl);
            input.value = '';
        }

        function handleKeyPress(e) { if (e.key === 'Enter') addTask(); }

        // Drag & Drop
        function allowDrop(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); }
        function dragLeave(ev) { ev.currentTarget.classList.remove('drag-over'); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            const data = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(data);
            if (draggedElement && ev.currentTarget.classList.contains('drop-zone')) {
                ev.currentTarget.appendChild(draggedElement);
            }
        }

        // Export (ตัดปุ่ม Word ออกไปก่อนเพื่อความคลีนตามดีไซน์ใหม่ แต่ปุ่มอื่นยังทำงานปกติ)
        async function exportData(type) {
            const container = document.getElementById('timetableContainer');
            container.classList.add('exporting'); 

            try {
                if (type === 'image') {
                    const canvas = await html2canvas(container, { scale: 2, backgroundColor: null });
                    const link = document.createElement("a");
                    link.download = "schedule.png"; link.href = canvas.toDataURL("image/png"); link.click();
                } 
                else if (type === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const canvas = await html2canvas(container, { scale: 2 });
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save("schedule.pdf");
                }
                else if (type === 'excel') {
                    let ws_data = [['ช่วงเวลา', 'งานที่ต้องทำ']];
                    document.querySelectorAll('#scheduleTable tbody tr').forEach(row => {
                        const time = row.cells[0].innerText;
                        const tasks = Array.from(row.cells[1].querySelectorAll('.task-item span:first-child'))
                                           .map(span => span.innerText).join(', ');
                        ws_data.push([time, tasks]);
                    });
                    const wb = XLSX.utils.book_new();
                    const ws = XLSX.utils.aoa_to_sheet(ws_data);
                    XLSX.utils.book_append_sheet(wb, ws, "Schedule");
                    XLSX.writeFile(wb, "schedule.xlsx");
                }
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการ Export");
            } finally {
                container.classList.remove('exporting');
            }
        }

        window.onload = generateTimetable;
    </script>
</body>
</html>
