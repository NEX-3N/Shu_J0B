<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Focus - Your Personal Productivity Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #faf8f6;
            --bg-secondary: #ffffff;
            --text-primary: #1a1512;
            --text-secondary: #6b635a;
            --accent: #d97706;
            --accent-light: #fef3c7;
            --success: #059669;
            --danger: #dc2626;
            --border: #e7e5e4;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.08);
            
            --font-display: 'Crimson Pro', serif;
            --font-body: 'DM Sans', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
        }

        .header-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header-date {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .btn {
            padding: 0.65rem 1.25rem;
            border-radius: 8px;
            border: none;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #b45309;
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        /* Grid Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Card */
        .card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.75rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Quick Add */
        .quick-add {
            position: sticky;
            top: 2rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: all 0.2s ease;
            background: var(--bg-primary);
        }

        .input:focus {
            outline: none;
            border-color: var(--accent);
            background: white;
        }

        .select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%236b635a' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            padding-right: 2.5rem;
        }

        /* Timeline */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .time-block {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 1.5rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
            min-height: 80px;
        }

        .time-block:last-child {
            border-bottom: none;
        }

        .time-label {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding-top: 0.25rem;
        }

        .time-slot {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-height: 50px;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .time-slot:hover {
            background: var(--accent-light);
        }

        .time-slot.has-tasks {
            background: var(--bg-primary);
        }

        .task {
            background: white;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 0.85rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .task:hover {
            border-color: var(--accent);
            transform: translateX(2px);
            box-shadow: var(--shadow);
        }

        .task.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .task.completed .task-checkbox {
            background: var(--success);
            border-color: var(--success);
            position: relative;
        }

        .task.completed .task-checkbox::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 12px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .task-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .task-priority {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .priority-high { background: var(--danger); }
        .priority-medium { background: var(--accent); }
        .priority-low { background: var(--success); }

        .task-actions {
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .task:hover .task-actions {
            opacity: 1;
        }

        .task-action {
            width: 28px;
            height: 28px;
            border: none;
            background: var(--bg-primary);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .task-action:hover {
            background: var(--accent-light);
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--bg-primary);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #f59e0b);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        /* Habits */
        .habit-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .habit-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-primary);
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: all 0.2s;
            cursor: pointer;
        }

        .habit-item:hover {
            border-color: var(--accent);
        }

        .habit-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .habit-item.checked .habit-checkbox {
            background: var(--accent);
            border-color: var(--accent);
            position: relative;
        }

        .habit-item.checked .habit-checkbox::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .habit-name {
            flex: 1;
            font-weight: 500;
        }

        .habit-streak {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 600;
        }

        /* Weekly View */
        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .day-cell {
            aspect-ratio: 1;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-primary);
        }

        .day-cell:hover {
            border-color: var(--accent);
        }

        .day-cell.today {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .day-cell.completed {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .day-name {
            font-size: 0.7rem;
            opacity: 0.7;
            font-weight: 500;
        }

        .day-number {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .day-tasks {
            font-size: 0.7rem;
            margin-top: 0.25rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task, .habit-item {
            animation: slideIn 0.3s ease;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: var(--bg-primary);
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            display: none;
            align-items: center;
            gap: 0.75rem;
            z-index: 1001;
            animation: slideIn 0.3s ease;
        }

        .notification.show {
            display: flex;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header-title {
                font-size: 1.75rem;
            }

            .time-block {
                grid-template-columns: 60px 1fr;
                gap: 1rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1 class="header-title">Daily Focus</h1>
                <div class="header-date" id="currentDate"></div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="showWeekView()">
                    <span>📅</span> Week
                </button>
                <button class="btn btn-secondary" onclick="showStats()">
                    <span>📊</span> Stats
                </button>
                <button class="btn btn-primary" onclick="showQuickAdd()">
                    <span>+</span> Add Task
                </button>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Quick Add -->
                <div class="card quick-add">
                    <h2 class="card-title">⚡ Quick Add</h2>
                    
                    <div class="input-group">
                        <label class="input-label">Task name</label>
                        <input type="text" 
                               class="input" 
                               id="taskInput" 
                               placeholder="What needs to be done?"
                               onkeypress="handleTaskKeyPress(event)">
                    </div>

                    <div class="input-group">
                        <label class="input-label">Time</label>
                        <select class="input select" id="timeInput">
                            <option value="">Unscheduled</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Priority</label>
                        <select class="input select" id="priorityInput">
                            <option value="low">🟢 Low</option>
                            <option value="medium" selected>🟡 Medium</option>
                            <option value="high">🔴 High</option>
                        </select>
                    </div>

                    <button class="btn btn-primary" style="width: 100%;" onclick="addTask()">
                        Add Task
                    </button>
                </div>

                <!-- Daily Stats -->
                <div class="card" style="margin-top: 1.5rem;">
                    <h2 class="card-title">📈 Today's Progress</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="completedCount">0</div>
                            <div class="stat-label">Completed</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="totalCount">0</div>
                            <div class="stat-label">Total Tasks</div>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Daily Habits -->
                <div class="card" style="margin-top: 1.5rem;">
                    <h2 class="card-title">✨ Daily Habits</h2>
                    <div class="habit-list" id="habitList"></div>
                    <button class="btn btn-secondary" style="width: 100%; margin-top: 1rem;" onclick="addHabit()">
                        + Add Habit
                    </button>
                </div>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <div class="card">
                    <h2 class="card-title">🗓️ Today's Schedule</h2>
                    <div class="timeline" id="timeline"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Week View Modal -->
    <div class="modal" id="weekModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Week Overview</h2>
                <button class="close-btn" onclick="closeModal('weekModal')">×</button>
            </div>
            <div class="week-grid" id="weekGrid"></div>
        </div>
    </div>

    <!-- Stats Modal -->
    <div class="modal" id="statsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Statistics</h2>
                <button class="close-btn" onclick="closeModal('statsModal')">×</button>
            </div>
            <div id="statsContent"></div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <span id="notificationText"></span>
    </div>

    <script>
        // State Management
        let state = {
            tasks: [],
            habits: [],
            history: {}, // date -> tasks
            currentDate: new Date().toISOString().split('T')[0]
        };

        // Initialize
        function init() {
            loadState();
            setupTimeSlots();
            updateDate();
            renderTimeline();
            renderHabits();
            updateStats();
            
            // Auto-save every 30 seconds
            setInterval(saveState, 30000);
            
            // Check for new day
            setInterval(checkNewDay, 60000);
        }

        function setupTimeSlots() {
            const timeSelect = document.getElementById('timeInput');
            for (let hour = 6; hour <= 23; hour++) {
                const time = `${hour.toString().padStart(2, '0')}:00`;
                const option = document.createElement('option');
                option.value = time;
                option.textContent = time;
                timeSelect.appendChild(option);
            }
        }

        function updateDate() {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const now = new Date();
            const dayName = days[now.getDay()];
            const monthName = months[now.getMonth()];
            const date = now.getDate();
            const year = now.getFullYear();
            
            document.getElementById('currentDate').textContent = `${dayName}, ${monthName} ${date}, ${year}`;
        }

        function checkNewDay() {
            const today = new Date().toISOString().split('T')[0];
            if (today !== state.currentDate) {
                // Archive yesterday's tasks
                state.history[state.currentDate] = JSON.parse(JSON.stringify(state.tasks));
                
                // Reset tasks for new day
                state.tasks = [];
                state.currentDate = today;
                
                // Reset habit checks
                state.habits.forEach(h => h.checked = false);
                
                saveState();
                renderTimeline();
                renderHabits();
                updateStats();
                showNotification('🌅 New day started! Good morning!');
            }
        }

        // Task Management
        function addTask() {
            const input = document.getElementById('taskInput');
            const timeInput = document.getElementById('timeInput');
            const priorityInput = document.getElementById('priorityInput');
            
            const text = input.value.trim();
            if (!text) return;

            const task = {
                id: Date.now(),
                text: text,
                time: timeInput.value,
                priority: priorityInput.value,
                completed: false,
                createdAt: new Date().toISOString()
            };

            state.tasks.push(task);
            
            // Clear inputs
            input.value = '';
            timeInput.value = '';
            priorityInput.value = 'medium';
            
            saveState();
            renderTimeline();
            updateStats();
            showNotification('✅ Task added!');
        }

        function handleTaskKeyPress(event) {
            if (event.key === 'Enter') {
                addTask();
            }
        }

        function toggleTask(id) {
            const task = state.tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveState();
                renderTimeline();
                updateStats();
                
                if (task.completed) {
                    showNotification('🎉 Task completed!');
                }
            }
        }

        function deleteTask(id) {
            if (confirm('Delete this task?')) {
                state.tasks = state.tasks.filter(t => t.id !== id);
                saveState();
                renderTimeline();
                updateStats();
            }
        }

        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            // Group tasks by time
            const tasksByTime = {};
            state.tasks.forEach(task => {
                const time = task.time || 'unscheduled';
                if (!tasksByTime[time]) {
                    tasksByTime[time] = [];
                }
                tasksByTime[time].push(task);
            });

            // Generate time blocks
            for (let hour = 6; hour <= 23; hour++) {
                const time = `${hour.toString().padStart(2, '0')}:00`;
                const tasks = tasksByTime[time] || [];
                
                const block = document.createElement('div');
                block.className = 'time-block';
                
                block.innerHTML = `
                    <div class="time-label">${time}</div>
                    <div class="time-slot ${tasks.length > 0 ? 'has-tasks' : ''}">
                        ${tasks.map(task => createTaskHTML(task)).join('')}
                        ${tasks.length === 0 ? '<div style="color: var(--text-secondary); font-size: 0.9rem; opacity: 0.5;">No tasks scheduled</div>' : ''}
                    </div>
                `;
                
                timeline.appendChild(block);
            }

            // Unscheduled tasks
            const unscheduled = tasksByTime['unscheduled'] || [];
            if (unscheduled.length > 0) {
                const block = document.createElement('div');
                block.className = 'time-block';
                block.innerHTML = `
                    <div class="time-label">Later</div>
                    <div class="time-slot has-tasks">
                        ${unscheduled.map(task => createTaskHTML(task)).join('')}
                    </div>
                `;
                timeline.appendChild(block);
            }
        }

        function createTaskHTML(task) {
            return `
                <div class="task ${task.completed ? 'completed' : ''}" onclick="toggleTask(${task.id})">
                    <div class="task-checkbox"></div>
                    <div class="task-priority priority-${task.priority}"></div>
                    <div class="task-content">
                        <div class="task-title">${task.text}</div>
                    </div>
                    <div class="task-actions">
                        <button class="task-action" onclick="event.stopPropagation(); deleteTask(${task.id})">🗑️</button>
                    </div>
                </div>
            `;
        }

        // Habits Management
        function addHabit() {
            const name = prompt('Habit name:');
            if (!name) return;

            const habit = {
                id: Date.now(),
                name: name,
                checked: false,
                streak: 0,
                history: []
            };

            state.habits.push(habit);
            saveState();
            renderHabits();
        }

        function toggleHabit(id) {
            const habit = state.habits.find(h => h.id === id);
            if (habit) {
                habit.checked = !habit.checked;
                
                if (habit.checked) {
                    habit.streak++;
                    habit.history.push(state.currentDate);
                } else {
                    habit.streak = Math.max(0, habit.streak - 1);
                    habit.history = habit.history.filter(d => d !== state.currentDate);
                }
                
                saveState();
                renderHabits();
            }
        }

        function deleteHabit(id) {
            if (confirm('Delete this habit?')) {
                state.habits = state.habits.filter(h => h.id !== id);
                saveState();
                renderHabits();
            }
        }

        function renderHabits() {
            const habitList = document.getElementById('habitList');
            
            if (state.habits.length === 0) {
                habitList.innerHTML = '<div class="empty-state"><div class="empty-icon">✨</div><div>No habits yet. Start building good habits!</div></div>';
                return;
            }

            habitList.innerHTML = state.habits.map(habit => `
                <div class="habit-item ${habit.checked ? 'checked' : ''}" onclick="toggleHabit(${habit.id})">
                    <div class="habit-checkbox"></div>
                    <div class="habit-name">${habit.name}</div>
                    <div class="habit-streak">🔥 ${habit.streak}</div>
                    <button class="task-action" onclick="event.stopPropagation(); deleteHabit(${habit.id})" style="opacity: 0.3;">🗑️</button>
                </div>
            `).join('');
        }

        // Statistics
        function updateStats() {
            const completed = state.tasks.filter(t => t.completed).length;
            const total = state.tasks.length;
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('completedCount').textContent = completed;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        function showStats() {
            const modal = document.getElementById('statsModal');
            const content = document.getElementById('statsContent');
            
            // Calculate weekly stats
            const last7Days = [];
            const today = new Date();
            
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                
                const dayTasks = dateStr === state.currentDate ? state.tasks : (state.history[dateStr] || []);
                const completed = dayTasks.filter(t => t.completed).length;
                const total = dayTasks.length;
                
                last7Days.push({
                    date: dateStr,
                    day: date.toLocaleDateString('en-US', { weekday: 'short' }),
                    completed,
                    total
                });
            }
            
            // Total habits streak
            const totalHabitStreak = state.habits.reduce((sum, h) => sum + h.streak, 0);
            
            content.innerHTML = `
                <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 2rem;">
                    <div class="stat-card">
                        <div class="stat-value">${last7Days.reduce((sum, d) => sum + d.completed, 0)}</div>
                        <div class="stat-label">Tasks This Week</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${totalHabitStreak}</div>
                        <div class="stat-label">Total Streak</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${state.habits.filter(h => h.checked).length}/${state.habits.length}</div>
                        <div class="stat-label">Habits Today</div>
                    </div>
                </div>
                
                <h3 style="font-family: var(--font-display); font-size: 1.25rem; margin-bottom: 1rem;">Last 7 Days</h3>
                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                    ${last7Days.map(day => `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg-primary); border-radius: 8px;">
                            <div style="font-weight: 500;">${day.day}</div>
                            <div style="font-size: 0.9rem; color: var(--text-secondary);">${day.completed}/${day.total} tasks</div>
                            <div style="width: 100px; height: 6px; background: var(--border); border-radius: 10px; overflow: hidden;">
                                <div style="height: 100%; background: var(--accent); width: ${day.total > 0 ? (day.completed/day.total*100) : 0}%;"></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            modal.classList.add('active');
        }

        function showWeekView() {
            const modal = document.getElementById('weekModal');
            const grid = document.getElementById('weekGrid');
            
            const today = new Date();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            
            let html = '';
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            
            for (let i = 0; i < 7; i++) {
                const date = new Date(startOfWeek);
                date.setDate(startOfWeek.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                
                const isToday = dateStr === state.currentDate;
                const dayTasks = dateStr === state.currentDate ? state.tasks : (state.history[dateStr] || []);
                const completed = dayTasks.filter(t => t.completed).length;
                const total = dayTasks.length;
                const allCompleted = total > 0 && completed === total;
                
                html += `
                    <div class="day-cell ${isToday ? 'today' : ''} ${allCompleted ? 'completed' : ''}">
                        <div class="day-name">${days[i]}</div>
                        <div class="day-number">${date.getDate()}</div>
                        <div class="day-tasks">${total} tasks</div>
                    </div>
                `;
            }
            
            grid.innerHTML = html;
            modal.classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function showQuickAdd() {
            document.getElementById('taskInput').focus();
        }

        // Storage
        function saveState() {
            localStorage.setItem('dailyFocus_v1', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('dailyFocus_v1');
            if (saved) {
                state = JSON.parse(saved);
            } else {
                // Initialize with sample habits
                state.habits = [
                    { id: 1, name: 'Morning Exercise', checked: false, streak: 0, history: [] },
                    { id: 2, name: 'Read 30 minutes', checked: false, streak: 0, history: [] },
                    { id: 3, name: 'Drink 8 glasses of water', checked: false, streak: 0, history: [] }
                ];
            }
        }

        // Notifications
        function showNotification(text) {
            const notification = document.getElementById('notification');
            const textEl = document.getElementById('notificationText');
            textEl.textContent = text;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Close modals on outside click
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
            }
        });

        // Start the app
        init();
    </script>
</body>
</html>
